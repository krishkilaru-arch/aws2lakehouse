bundle:
  name: acme-retail-data-platform

workspace:
  host: ${var.workspace_host}

variables:
  workspace_host:
    description: Databricks workspace URL

targets:
  dev:
    mode: development
    default: true
    variables:
      workspace_host: ""

  staging:
    mode: development
    variables:
      workspace_host: ""

  production:
    mode: production
    variables:
      workspace_host: ""
    run_as:
      service_principal_name: acme-retail-data-platform-sp

include:
    - resources/jobs/ecommerce_daily_etl.yml
