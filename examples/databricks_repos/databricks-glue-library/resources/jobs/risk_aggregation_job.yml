resources:
  jobs:
    risk_aggregation_job:
      name: "[prod] finance/risk_aggregation_job"
      description: "Migrated from AWS: auto_loader → finance_bronze"
      tasks:
        - task_key: risk_aggregation_job
          notebook_task:
            notebook_path: pipelines/finance/risk_aggregation_job
            base_parameters:
              CATALOG: "acme_prod"
              SCHEMA: "finance_bronze"
              TABLE: "risk_aggregation_job"
          max_retries: 2
          timeout_seconds: 3600
      tags:
        domain: "finance"
        layer: "bronze"
        classification: "internal"
