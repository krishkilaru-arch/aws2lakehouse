bundle:
  name: acme-finance-data-platform

variables:
  workspace_host:
    description: The Databricks workspace host URL

workspace:
  host: ${var.workspace_host}

include:
  - resources/jobs/bronze_ingestion.yml
  - resources/jobs/bronze_to_silver.yml
  - resources/jobs/silver_transformation.yml
  - resources/jobs/silver_to_gold.yml
  - resources/jobs/gold_aggregation.yml

resources:
  jobs:
    data_platform_orchestration:
      name: acme-finance-data-platform-orchestration
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: src/bronze/ingestion.py
        - task_key: bronze_to_silver
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: src/bronze/bronze_to_silver.py
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_to_silver
          notebook_task:
            notebook_path: src/silver/transformation.py
        - task_key: silver_to_gold
          depends_on:
            - task_key: silver_transformation
          notebook_task:
            notebook_path: src/silver/silver_to_gold.py
        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_to_gold
          notebook_task:
            notebook_path: src/gold/aggregation.py

targets:
  dev:
    mode: development
    default: true
    variables:
      workspace_host: https://dev.cloud.databricks.com
    resources:
      jobs:
        data_platform_orchestration:
          name: "[dev] acme-finance-data-platform-orchestration"

  staging:
    variables:
      workspace_host: https://staging.cloud.databricks.com
    resources:
      jobs:
        data_platform_orchestration:
          name: "[staging] acme-finance-data-platform-orchestration"

  production:
    mode: production
    variables:
      workspace_host: https://production.cloud.databricks.com
    run_as:
      service_principal_name: acme-finance-platform-sp
    resources:
      jobs:
        data_platform_orchestration:
          name: acme-finance-data-platform-orchestration
          schedule:
            pause_status: UNPAUSED