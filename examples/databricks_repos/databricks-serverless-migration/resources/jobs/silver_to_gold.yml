resources:
  jobs:
    finance_gold_silver_to_gold:
      name: "[prod] finance/silver_to_gold"
      tags:
        domain: "finance"
        layer: "gold"
        classification: "internal"
      tasks:
        - task_key: "silver_to_gold"
          notebook_task:
            notebook_path: "src/pipelines/finance/gold/silver_to_gold"
            base_parameters:
              catalog: "acme_prod"
              schema: "finance_gold"
              table: "silver_to_gold"
          timeout_seconds: 3600
          max_retries: 2
          environment_key: "serverless"
      environments:
        - environment_key: "serverless"
          spec:
            client: "1"
      queue:
        enabled: true