resources:
  jobs:
    finance_bronze_bronze_ingestion:
      name: "[prod] finance/bronze_ingestion"
      tags:
        domain: "finance"
        layer: "bronze"
        classification: "internal"
      max_retries: 2
      timeout_seconds: 3600
      tasks:
        - task_key: "bronze_ingestion"
          notebook_task:
            notebook_path: "src/pipelines/finance/bronze/bronze_ingestion"
            base_parameters:
              catalog: "acme_prod"
              schema: "finance_bronze"
              table: "bronze_ingestion"
          environment_key: "serverless"
      environments:
        - environment_key: "serverless"
          spec:
            client: "2"
      queue:
        enabled: true