resources:
  jobs:
    finance_gold_gold_aggregation:
      name: "[prod] finance/gold_aggregation"
      tags:
        domain: "finance"
        layer: "gold"
        classification: "internal"
      tasks:
        - task_key: gold_aggregation
          notebook_task:
            notebook_path: src/pipelines/finance/gold/gold_aggregation
            base_parameters:
              catalog: acme_prod
              schema: finance_gold
              table: gold_aggregation
          timeout_seconds: 3600
          max_retries: 2
          environment_key: serverless
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      queue:
        enabled: true