resources:
  jobs:
    finance_silver_silver_transformation:
      name: "[prod] finance/silver_transformation"
      tags:
        domain: "finance"
        layer: "silver"
        classification: "internal"
      tasks:
        - task_key: "silver_transformation_task"
          notebook_task:
            notebook_path: "src/pipelines/finance/silver/silver_transformation"
            base_parameters:
              catalog: "acme_prod"
              schema: "finance_silver"
              table: "silver_transformation"
          timeout_seconds: 3600
          max_retries: 2
          environment_key: "serverless"
      environments:
        - environment_key: "serverless"
          spec:
            client: "2"
      queue:
        enabled: true