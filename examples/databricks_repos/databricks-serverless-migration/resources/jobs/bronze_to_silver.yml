resources:
  jobs:
    finance_silver_bronze_to_silver:
      name: "[prod] finance/bronze_to_silver"
      tags:
        domain: "finance"
        layer: "silver"
        classification: "internal"
      tasks:
        - task_key: "bronze_to_silver"
          notebook_task:
            notebook_path: "src/pipelines/finance/silver/bronze_to_silver"
            base_parameters:
              catalog: "acme_prod"
              schema: "finance_silver"
              table: "bronze_to_silver"
          timeout_seconds: 3600
          max_retries: 2
          environment_key: "serverless"
      environments:
        - environment_key: "serverless"
          spec:
            client: "1"
      queue:
        enabled: true